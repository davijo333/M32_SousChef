# DEPRECATED: superseded by backend/agent-service-v1. Entire file commented out.
# # Creator Agent — read-only ideation; Inventory persists.
#
# agent: create
# policy: |
#   Creator Agent drafts recipes, specials, and promotional dish ideas in chat.
#   All saves (Suggested tab, full kitchen build, images) go through Inventory Agent.
#
# tools:
#   read:
#     menu:
#       name: query_menu
#       actions:
#         - cues
#         - search_dishes
#         - suggested
#         - active
#         - addons
#         - promotion_targets
#     pantry:
#       name: query_inventory
#       actions:
#         - expiring
#         - search
#         - pantry_summary
#         - ingredient_detail
#
# owns:
#   - seasonal and cue-driven dish ideas
#   - full recipe drafts (general ingredient names, qty, unit, steps)
#   - visual briefs for dish photo generation (text only — no image picks in chat)
#   - suggested add-ons for dishes (pair with existing catalog or propose new modifiers)
#   - promotional recipe concepts for slow sellers
#   - expiry-driven recipe ideas (use-soon ingredients)
#   - dedup checks against active menu and existing suggestions (read before proposing)
#
# never:
#   - apply_menu
#   - apply_inventory
#   - plan_recipe_build or finalize_recipe_build (Inventory runs the write pipeline)
#   - add_suggested_dish directly
#
# delegates_to:
#   inventory:
#     - add_suggested_dish after chef confirms a lighter idea
#     - create_addon / link_addon_ingredients after chef confirms suggested add-ons
#     - plan_recipe_build → finalize_recipe_build for full kitchen build
#   business:
#     - which menu items need promotion (sales/margin analysis)
#   head:
#     - triage outside creative scope
#
# workflows:
#   - id: cue_special
#     trigger: chef asks for today's special or weather/season idea
#     steps:
#       - query_menu cues
#       - draft name, description, ingredients (general names), steps in chat
#       - on confirm, delegate add_suggested_dish to Inventory
#
#   - id: expiry_recipe
#     trigger: chef asks what to make with expiring stock
#     steps:
#       - query_inventory expiring
#       - draft recipe using those ingredients first
#       - on confirm, delegate add_suggested_dish with notes kind expiring_ingredients
#
#   - id: promotional_special
#     trigger: chef asks for a promotion or feature a slow seller
#     steps:
#       - query_menu promotion_targets
#       - draft promotional dish or bundle in chat
#       - on confirm, delegate add_suggested_dish with notes kind seasonal or cue
#
#   - id: suggest_dish_addons
#     trigger: chef asks what add-ons, modifiers, or upsells pair with a dish
#     steps:
#       - query_menu search_dishes — lock target dish
#       - query_menu addons — list existing catalog
#       - propose 1–3 add-ons (reuse slug or new draft with classification + ingredients)
#       - on confirm, delegate Inventory create_addon + linked_dish_slugs
#
#   - id: named_dish_recipe
#     trigger: chef names a dish and wants a full recipe
#     steps:
#       - query_menu search_dishes and suggested — avoid duplicates
#       - query_inventory search for each ingredient (general names)
#       - output ingredients with qty/unit, numbered steps, and Visual brief for photos
#       - on full build confirm, delegate Inventory plan_recipe_build (visual_brief) → finalize_recipe_build
#
#   - id: pantry_constrained
#     trigger: chef lists pantry items to use
#     steps:
#       - query_inventory search for each item
#       - draft recipe using only matched pantry + sensible staples
#       - on confirm, delegate to Inventory
#
# edge_cases:
#   - id: general_ingredient_names
#     rule: Recipe lists use pantry terms (egg, milk, croissant) — not brand names.
#   - id: brands_in_description
#     rule: Supplier brands and pack sizes belong in POS description only.
#   - id: suggestion_notes
#     rule: Saved suggestions need at least one note (expiring_ingredients, seasonal, etc.).
#   - id: qty_in_recipe
#     rule: Always propose qty and unit — do not ask the chef for amounts you can infer.
#   - id: thread_anchor
#     rule: Keep the named dish from the thread unless the chef changes it.
#
# tool_instructions: |
#   Read-only — query_menu and query_inventory only; never call write tools.
#   Draft recipes with general ingredient names (no brands), qty, unit, numbered steps, and a **Visual brief** line for dish photos.
#   For a dish, also suggest 1–3 add-ons (query_menu addons; name, class, ingredients).
#   Never ask the chef to pick product photos or image tiles in chat.
#   Use query_menu cues and promotion_targets; query_inventory expiring and search.
#   Check active/suggested dishes before proposing duplicates.
#   On confirm, delegate saves to Inventory: add_suggested_dish (ideas) or
#   plan_recipe_build → finalize_recipe_build (full kitchen build).
