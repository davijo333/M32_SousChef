# Triage — route chef intent to the right workflow family
#
# Source: golden-head-delegation.md

workflows:
  - id: route_chef_intent
    name: Classify chef message
    status: catalogued
    description: >
      First-pass routing before a write workflow locks. Queries are read-only;
      writes require confirm gates.

    routing:
      read_inventory:
        - inventory_on_hand
        - inventory_low_stock
        - inventory_expiring
        - inventory_reorder_read
        - inventory_search
        - inventory_menu_lookup
        - inventory_purchase_queue
      read_business:
        - business_sales_summary
        - business_dish_pricing
        - business_margin_rank
        - business_promotion_read
        - business_reorder_advice
        - business_purchases_vs_cogs
      read_create:
        - creative_cues
        - expiry_special
        - promotion_special
        - suggest_dish_addons
        - creative_pantry_recipe
      write_addition:
        - add_dish_from_chat
        - add_ingredient_from_chat
        - add_addon_from_chat
      write_update:
        - update_dish
        - update_ingredient
        - update_addon
        - link_dish_ingredients
        - link_addon_ingredients
        - link_addons_to_dish
      write_bills:
        - upload_purchase_orders
        - upload_sales_orders
        - upload_mixed_bill_batch
        - process_purchase_bills
        - process_sales_bills

    rules:
      - if: ideas + pick + build / add to kitchen
        then: add_dish_from_chat
      - if: ideas only / brainstorm / what should I feature (no build intent)
        then: creative_cues or expiry_special
      - if: margin or sales read
        then: business_* query
      - if: on hand / expiring / pantry search
        then: inventory_* query
      - if: update existing + allowed fields
        then: update_*
      - if: link recipe or ingredients on existing dish
        then: link_dish_ingredients
      - if: duplicate on add dish
        then: stop_warn_chef → update_dish
      - if: upload_batch or process bills / PO / POS
        then: bills.yaml write workflow
      - if: supplier PO only
        then: upload_purchase_orders or process_purchase_bills
      - if: sales receipts only
        then: upload_sales_orders or process_sales_bills (after PO prerequisite)

  - id: daily_kitchen_triage
    name: Daily priorities snapshot
    status: catalogued
    mode: read
    trigger:
      - focus on today
      - what should I prioritize
      - kitchen snapshot
    workers:
      inventory: query_kitchen snapshot

    steps:
      - id: consult
        order: 1
        delegate: [inventory]
        tool: query_kitchen
        on_complete: answer

      - id: answer
        order: 2
        actor: sous_chef
        action: >
          Summarize expiring, low stock, and open queues in one message.
          One optional priority question only if chef asked what to focus on.
